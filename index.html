<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP Jewellers</title>

    <!-- Google Fonts Premium Look Ke Liye -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons Link (WhatsApp & Instagram Icons Ke Liye) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Aapki Custom CSS File -->
    <link rel="stylesheet" href="style.css">

    <!-- SEO Meta Tags (Google Search Me Rank Karne Ke Liye) -->
    <meta name="description" content="RP Jewellers - Premium and Luxury Jewellery Store in Naugachhia, Bihar. Explore our exclusive signature collections.">
    <meta name="keywords" content="RP Jewellers, RP Jewellers Naugachhia, Jewellers in Bihar, Jewellery Store Naugachhia, Gold Diamond Jewellery">
    <meta name="author" content="RP Jewellers">

    <!-- Google Site Verification Tag (Google Search Console Waala Code Yahan Paste Karein) -->
    <meta name="google-site-verification" content="XYZ_AAPKA_GOOGLE_CODE_YAHAN_AAYEGA" />
</head>
<body>

    <!-- 1. Premium 1-100% Circle Preloader -->
    <div id="preloader">
        <div class="loader-container">
            <div class="circle outer-circle"></div>
            <div class="circle inner-circle"></div>
            <h2 class="loader-logo">RP JEWELLERS</h2>
            <div id="counter">0%</div>
        </div>
    </div>

    <!-- 2. Main Website Layout (Jo Loading ke baad smooth entry lega) -->
    <div id="main-content">
        <!-- Header / Navbar -->
        <header class="navbar">
            <div class="logo">RP JEWELLERS</div>
            <nav class="nav-links">
                <a href="#">COLLECTIONS</a>
                <a href="#">SIGNATURE</a>
                <a href="#">ATELIER</a>
                <a href="#">CONTACT</a>
            </nav>
            <button class="book-visit">BOOK VISIT</button>
        </header>

        <!-- Hero Section / 3D Cinematic Slider -->
        <section class="hero-container">
            <div class="slider">
                <div class="slide slide1"></div>
                <div class="slide slide2"></div>
            </div>

            <!-- Overlay Text & Buttons -->
            <div class="hero-content">
                <p class="subtitle">EST. 2000 — NAUGACHIA, BIHAR</p>
                <h1 class="main-title">RP JEWELLERS</h1>
                <div class="cta-buttons">
                    <a href="#" class="btn btn-outline">COLLECTIONS</a>
                    <a href="#" class="btn btn-filled">ENTER SITE →</a>
                </div>
            </div>
        </section>
    </div>

    <!-- 3. Floating Social Media Buttons (WhatsApp aur Instagram) -->
    <div class="floating-socials">
        <!-- WhatsApp Link (91XXXXXXXXXX ki jagah apna 10-digit number likhein) -->
        <a href="https://wa.me/919631558655" target="_blank" class="social-btn whatsapp" title="Chat on WhatsApp">
            <i class="fa-brands fa-whatsapp"></i>
        </a>
        
        <!-- Instagram Link (rpjewellers ki jagah apna username handle dalein) -->
        <a href="https://instagram.com/mangowebdesignnstudio" target="_blank" class="social-btn instagram" title="Follow on Instagram">
            <i class="fa-brands fa-instagram"></i>
        </a>
    </div>

    <!-- JavaScript: 0% se 100% Loader Count aur Smooth Transition Ke Liye -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            let counterElement = document.getElementById("counter");
            let preloader = document.getElementById("preloader");
            let mainContent = document.getElementById("main-content");
            let count = 0;

            let loadingInterval = setInterval(() => {
                count++;
                counterElement.innerText = count + "%";

                if (count === 100) {
                    clearInterval(loadingInterval);
                    
                    preloader.style.opacity = "0";
                    preloader.style.visibility = "hidden";
                    
                    mainContent.classList.add("visible");
                }
            }, 30); 
        });
    </script>
</body>
</html>
